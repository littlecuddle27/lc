<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Manager – Little Cuddle</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Nunito', sans-serif; background: #f5f8ff; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; background: white; border-radius: 24px; box-shadow: 0 8px 32px rgba(0,0,0,.1); overflow: hidden; padding: 24px; }
        h1, h2 { font-family: 'Pacifico', cursive; color: #e91e8c; margin-bottom: 16px; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px,1fr)); gap: 20px; margin-top: 20px; }
        .product-card { background: #fff; border-radius: 16px; padding: 16px; border: 1px solid #e3f2fd; position: relative; }
        .product-card h3 { font-size: 1rem; margin-bottom: 4px; }
        .product-card p { font-size: .8rem; color: #6677aa; margin-bottom: 8px; }
        .product-card .price { font-weight: 800; color: #e91e8c; }
        .product-buttons { display: flex; gap: 8px; margin-top: 12px; }
        button { background: linear-gradient(135deg, #1565c0, #e91e8c); color: white; border: none; padding: 8px 14px; border-radius: 40px; cursor: pointer; font-weight: 800; font-size: .8rem; }
        button.delete { background: #e53935; }
        .form-group { margin-bottom: 16px; }
        label { display: block; font-weight: 800; margin-bottom: 4px; font-size: .8rem; }
        input, select, textarea { width: 100%; padding: 10px; border: 2px solid #e3f2fd; border-radius: 12px; font-family: inherit; }
        .image-preview { max-width: 100px; margin-top: 8px; border-radius: 8px; }
        .export-btn { background: #2e7d32; margin-top: 16px; }
        .login-box { text-align: center; padding: 40px; }
        .login-box input { width: 250px; margin-top: 12px; }
        .hidden { display: none; }
    </style>
</head>
<body>
<div class="container" id="loginContainer">
    <div class="login-box">
        <h1><i class="fas fa-shield-alt"></i> Admin Access</h1>
        <p>Enter password to manage products</p>
        <input type="password" id="adminPwd" placeholder="Password">
        <button onclick="checkPassword()">Login</button>
    </div>
</div>

<div id="adminPanel" class="container hidden">
    <h1><i class="fas fa-edit"></i> Product Manager</h1>
    <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; margin-bottom: 20px;">
        <button onclick="showAddForm()">+ Add New Product</button>
        <button class="export-btn" onclick="downloadJSON()"><i class="fas fa-download"></i> Download products.json</button>
        <button onclick="refreshProducts()"><i class="fas fa-sync-alt"></i> Refresh</button>
    </div>

    <!-- Product list will appear here -->
    <div id="productsList" class="product-grid"></div>

    <!-- Add/Edit Form Modal -->
    <div id="formModal" style="display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,.5); backdrop-filter:blur(4px); z-index:1000; align-items:center; justify-content:center;">
        <div style="background:white; max-width:600px; width:90%; border-radius:28px; padding:24px; max-height:90vh; overflow:auto;">
            <h3 id="formTitle">Add Product</h3>
            <div class="form-group"><label>Name</label><input id="prodName" placeholder="Product name"></div>
            <div class="form-group">
                <label>Categories (select one or more)</label>
                <div id="catCheckboxes" style="display:flex; flex-wrap:wrap; gap:12px;">
                    <label><input type="checkbox" value="newborn"> Newborn</label>
                    <label><input type="checkbox" value="clothing"> Clothing</label>
                    <label><input type="checkbox" value="feeding"> Feeding</label>
                    <label><input type="checkbox" value="bath"> Bath & Care</label>
                    <label><input type="checkbox" value="mother"> Mother Care</label>
                </div>
            </div>
            <div class="form-group"><label>Description</label><textarea id="prodDesc" rows="2"></textarea></div>
            <div class="form-group"><label>Price (Rs.)</label><input type="number" id="prodPrice"></div>
            <div class="form-group"><label>Discount (%)</label><input type="number" id="prodDisc" value="0"></div>
            <div class="form-group"><label>Stock Quantity</label><input type="number" id="prodStock" value="0" min="0"></div>
            <div class="form-group"><label>Badge (NEW, HOT, SALE or empty)</label><input id="prodBadge" placeholder="NEW / HOT / SALE"></div>
            <div class="form-group"><label>Emoji (fallback icon)</label><input id="prodEmo" placeholder="e.g., &#128118;"></div>
            <div class="form-group"><label>Photo 1 (primary)</label><input type="file" id="photo1" accept="image/*"><img id="preview1" class="image-preview" style="display:none"></div>
            <div class="form-group"><label>Photo 2 (optional)</label><input type="file" id="photo2" accept="image/*"><img id="preview2" class="image-preview" style="display:none"></div>
            <div class="form-group" style="display:flex; gap:12px; justify-content:flex-end; margin-top:20px;">
                <button onclick="closeForm()">Cancel</button>
                <button id="saveBtn" onclick="saveProduct()">Save Product</button>
            </div>
        </div>
    </div>
</div>

<script>
    const ADMIN_PASSWORD_PREFIX = "littlecuddle";
    function getTodaysPassword() {
        const d = new Date();
        const y = d.getFullYear();
        const m = String(d.getMonth()+1).padStart(2,'0');
        const day = String(d.getDate()).padStart(2,'0');
        return ADMIN_PASSWORD_PREFIX + y + m + day;
    }
    function checkPassword() {
        const pwd = document.getElementById("adminPwd").value;
        if(pwd === getTodaysPassword()) {
            document.getElementById("loginContainer").style.display = "none";
            document.getElementById("adminPanel").classList.remove("hidden");
            loadProductsFromJSON();
        } else { alert("Wrong password"); }
    }

    let products = [];
    let editingId = null;

    async function loadProductsFromJSON() {
        try {
            const res = await fetch("products.json?t="+Date.now());
            if(!res.ok) throw new Error();
            products = await res.json();
            renderProducts();
        } catch(e) {
            alert("Could not load products.json. Make sure it exists and is valid JSON.");
        }
    }
    function renderProducts() {
        const container = document.getElementById("productsList");
        if(!products.length) { container.innerHTML = "<p>No products. Click '+ Add New Product'.</p>"; return; }
        let html = "";
        products.forEach(p => {
            html += `<div class="product-card">
                <h3>${p.name}</h3>
                <p>${p.desc.substring(0,60)}...</p>
                <div class="price">Rs. ${p.price} / Stock: ${p.stock}</div>
                <div class="product-buttons">
                    <button onclick="editProduct(${p.id})"><i class="fas fa-edit"></i> Edit</button>
                    <button class="delete" onclick="deleteProduct(${p.id})"><i class="fas fa-trash"></i> Delete</button>
                </div>
            </div>`;
        });
        container.innerHTML = html;
    }
    function showAddForm() {
        editingId = null;
        document.getElementById("formTitle").innerText = "Add New Product";
        document.getElementById("prodName").value = "";
        document.querySelectorAll("#catCheckboxes input").forEach(cb => cb.checked = false);
        document.getElementById("prodDesc").value = "";
        document.getElementById("prodPrice").value = "";
        document.getElementById("prodDisc").value = "0";
        document.getElementById("prodStock").value = "0";
        document.getElementById("prodBadge").value = "";
        document.getElementById("prodEmo").value = "&#128118;";
        document.getElementById("preview1").style.display = "none";
        document.getElementById("preview2").style.display = "none";
        document.getElementById("photo1").value = "";
        document.getElementById("photo2").value = "";
        document.getElementById("formModal").style.display = "flex";
    }
    function editProduct(id) {
        const p = products.find(x=>x.id===id);
        if(!p) return;
        editingId = id;
        document.getElementById("formTitle").innerText = "Edit Product";
        document.getElementById("prodName").value = p.name;
        document.querySelectorAll("#catCheckboxes input").forEach(cb => {
            cb.checked = p.categories.includes(cb.value);
        });
        document.getElementById("prodDesc").value = p.desc;
        document.getElementById("prodPrice").value = p.price;
        document.getElementById("prodDisc").value = p.disc;
        document.getElementById("prodStock").value = p.stock;
        document.getElementById("prodBadge").value = p.badge || "";
        document.getElementById("prodEmo").value = p.emo;
        document.getElementById("preview1").style.display = p.photos && p.photos[0] ? "block" : "none";
        if(p.photos && p.photos[0]) document.getElementById("preview1").src = p.photos[0];
        document.getElementById("preview2").style.display = p.photos && p.photos[1] ? "block" : "none";
        if(p.photos && p.photos[1]) document.getElementById("preview2").src = p.photos[1];
        document.getElementById("photo1").value = "";
        document.getElementById("photo2").value = "";
        document.getElementById("formModal").style.display = "flex";
    }
    function saveProduct() {
        const name = document.getElementById("prodName").value.trim();
        if(!name) { alert("Name required"); return; }
        const categories = Array.from(document.querySelectorAll("#catCheckboxes input:checked")).map(cb => cb.value);
        const desc = document.getElementById("prodDesc").value.trim();
        const price = parseFloat(document.getElementById("prodPrice").value);
        const disc = parseInt(document.getElementById("prodDisc").value)||0;
        const stock = parseInt(document.getElementById("prodStock").value)||0;
        const badge = document.getElementById("prodBadge").value.trim();
        let emo = document.getElementById("prodEmo").value.trim();
        if(!emo) emo = "&#128118;";
        let photo1 = "", photo2 = "";
        const file1 = document.getElementById("photo1").files[0];
        const file2 = document.getElementById("photo2").files[0];
        const oldPhotos = (editingId !== null) ? (products.find(p=>p.id===editingId)?.photos || []) : [];
        const process = (file, existing, callback) => {
            if(file) { const r = new FileReader(); r.onload = e => callback(e.target.result); r.readAsDataURL(file); }
            else callback(existing);
        };
        process(file1, oldPhotos[0] || "", (p1) => {
            process(file2, oldPhotos[1] || "", (p2) => {
                const photos = [p1, p2].filter(p => p && p !== "");
                if(editingId !== null) {
                    const idx = products.findIndex(p=>p.id===editingId);
                    if(idx!==-1) products[idx] = {...products[idx], name, categories, desc, price, disc, stock, badge, emo, photos};
                } else {
                    const newId = Date.now();
                    products.push({id:newId, name, categories, desc, price, disc, stock, badge, emo, photos});
                }
                closeForm();
                renderProducts();
                alert("Product saved. Click 'Download products.json' and upload to GitHub.");
            });
        });
    }
    function deleteProduct(id) {
        if(confirm("Delete permanently?")) {
            products = products.filter(p=>p.id!==id);
            renderProducts();
            alert("Deleted. Download the new JSON and upload to GitHub.");
        }
    }
    function downloadJSON() {
        const dataStr = JSON.stringify(products, null, 2);
        const blob = new Blob([dataStr], {type:"application/json"});
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "products.json";
        a.click();
        URL.revokeObjectURL(url);
        alert("Downloaded. Now upload this file to your GitHub repository (replace the old products.json).");
    }
    function refreshProducts() { loadProductsFromJSON(); }
    function closeForm() { document.getElementById("formModal").style.display = "none"; editingId = null; }
    document.getElementById("photo1").addEventListener("change", (e) => {
        if(e.target.files[0]) { const r = new FileReader(); r.onload = ev => { document.getElementById("preview1").src = ev.target.result; document.getElementById("preview1").style.display = "block"; }; r.readAsDataURL(e.target.files[0]); }
    });
    document.getElementById("photo2").addEventListener("change", (e) => {
        if(e.target.files[0]) { const r = new FileReader(); r.onload = ev => { document.getElementById("preview2").src = ev.target.result; document.getElementById("preview2").style.display = "block"; }; r.readAsDataURL(e.target.files[0]); }
    });
</script>
</body>
</html>
