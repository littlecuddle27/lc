<script>
// ── PRODUCTS DATA ─────────────────────────────────────────────────
//##PROD_START##
var DEFAULTS = [
  {id:1,  name:"Newborn Gift Set",        cat:"newborn",  desc:"Complete starter set: onesie, hat, mittens and booties.",            price:2800, disc:10, emo:"&#128118;", badge:"NEW",  photo:""},
  {id:2,  name:"Baby Swaddle Blanket",    cat:"newborn",  desc:"Ultra-soft muslin swaddle blanket, breathable and gentle on skin.",  price:1200, disc:0,  emo:"&#129528;", badge:"",     photo:""},
  {id:3,  name:"Baby Onesie Set (5pcs)",  cat:"clothing", desc:"5 soft cotton onesies in mixed colours, 0-3 months.",               price:2500, disc:15, emo:"&#128085;", badge:"HOT",  photo:""},
  {id:4,  name:"Newborn Sleepsuit",       cat:"clothing", desc:"Warm cosy all-in-one sleepsuit for nighttime comfort.",              price:1500, disc:0,  emo:"&#127769;", badge:"",     photo:""},
  {id:5,  name:"Baby Feeding Bottle Set", cat:"feeding",  desc:"Anti-colic BPA-free feeding bottles, 3 sizes included.",            price:1800, disc:10, emo:"&#127868;", badge:"",     photo:""},
  {id:6,  name:"Breast Pump (Manual)",    cat:"feeding",  desc:"Ergonomic manual breast pump, soft silicone, easy to clean.",       price:3500, disc:20, emo:"&#129329;", badge:"SALE", photo:""},
  {id:7,  name:"Baby Bath Kit",           cat:"bath",     desc:"Complete bath set: shampoo, lotion, wash and soft brush.",          price:2200, disc:0,  emo:"&#128705;", badge:"",     photo:""},
  {id:8,  name:"Baby Skincare Set",       cat:"bath",     desc:"Gentle moisturiser and powder for sensitive baby skin.",            price:1600, disc:5,  emo:"&#129396;", badge:"",     photo:""},
  {id:9,  name:"Maternity Pillow",        cat:"mother",   desc:"Full-body U-shaped pillow for pregnancy support and comfort.",      price:4500, disc:10, emo:"&#127800;", badge:"NEW",  photo:""},
  {id:10, name:"Nursing Cover",           cat:"mother",   desc:"Breathable nursing cover for discreet breastfeeding on the go.",    price:1200, disc:0,  emo:"&#128155;", badge:"",     photo:""},
  {id:11, name:"Diaper Bag Backpack",     cat:"newborn",  desc:"Large capacity waterproof organiser bag with USB charging port.",   price:3800, disc:15, emo:"&#127890;", badge:"HOT",  photo:""},
  {id:12, name:"Baby Monitor",            cat:"newborn",  desc:"Digital audio baby monitor with long range and clear sound.",       price:5500, disc:0,  emo:"&#128251;", badge:"",     photo:""}
];
//##PROD_END##

var products = (function(){
  try{ var s=localStorage.getItem("lc_products"); return s?JSON.parse(s):DEFAULTS; }catch(e){ return DEFAULTS; }
})();
var cart = (function(){ try{ var s=localStorage.getItem("lc_cart"); return s?JSON.parse(s):[]; }catch(e){ return []; }})();
var curCat = "all";
var curView = "grid";
var qvQty = 1;
var qvCurrent = null;

function dp(p){ return p.disc>0 ? Math.round(p.price*(1-p.disc/100)) : p.price; }
function saveCart(){ try{ localStorage.setItem("lc_cart",JSON.stringify(cart)); }catch(e){} }

// ── COUNTS ────────────────────────────────────────────────────────
function updateCounts(){
  var cats=["all","newborn","clothing","feeding","bath","mother"];
  cats.forEach(function(c){
    var el=document.getElementById("cnt-"+c);
    if(!el) return;
    el.textContent = c==="all" ? products.length : products.filter(function(p){return p.cat===c;}).length;
  });
}

// ── FILTERS & RENDER ──────────────────────────────────────────────
function setCat(cat, btn){
  curCat=cat;
  document.querySelectorAll(".cat-btn").forEach(function(b){ b.classList.remove("active"); });
  if(btn) btn.classList.add("active");
  applyFilters();
}

function applyFilters(){
  var search=(document.getElementById("search-inp").value||"").toLowerCase().trim();
  var sort=document.getElementById("sort-sel").value;
  var minP=parseFloat(document.getElementById("price-min").value)||0;
  var maxP=parseFloat(document.getElementById("price-max").value)||Infinity;

  var list=products.filter(function(p){
    var price=dp(p);
    var matchCat = curCat==="all" || p.cat===curCat;
    var matchSearch = !search || p.name.toLowerCase().includes(search) || p.desc.toLowerCase().includes(search);
    var matchPrice = price>=minP && price<=maxP;
    return matchCat && matchSearch && matchPrice;
  });

  if(sort==="price-low") list.sort(function(a,b){ return dp(a)-dp(b); });
  else if(sort==="price-high") list.sort(function(a,b){ return dp(b)-dp(a); });
  else if(sort==="discount") list.sort(function(a,b){ return b.disc-a.disc; });
  else if(sort==="name") list.sort(function(a,b){ return a.name.localeCompare(b.name); });

  document.getElementById("prod-count").textContent=list.length;
  renderProducts(list);
}

function clearFilters(){
  curCat="all";
  document.getElementById("search-inp").value="";
  document.getElementById("price-min").value="";
  document.getElementById("price-max").value="";
  document.getElementById("sort-sel").value="default";
  document.getElementById("sort-mob").value="default";
  document.querySelectorAll(".cat-btn").forEach(function(b){ b.classList.remove("active"); });
  document.querySelector('.cat-btn[onclick="setCat(\'all\',this)"]').classList.add("active");
  applyFilters();
}

function setView(v){
  curView=v;
  var g=document.getElementById("pgrid");
  g.classList.toggle("list-view", v==="list");
  document.getElementById("grid-btn").classList.toggle("active", v==="grid");
  document.getElementById("list-btn").classList.toggle("active", v==="list");
}

function renderProducts(list){
  var g=document.getElementById("pgrid");
  if(!list.length){
    g.innerHTML='<div class="empty-state" style="grid-column:1/-1"><i class="fas fa-search"></i><h3>No products found</h3><p>Try adjusting your filters or search term.</p></div>';
    return;
  }
  var html="";
  list.forEach(function(p){
    var price=dp(p);
    var badges="";
    if(p.badge==="NEW") badges+='<span class="badge badge-new">NEW</span>';
    else if(p.badge==="HOT") badges+='<span class="badge badge-hot">&#128293; HOT</span>';
    else if(p.badge==="SALE") badges+='<span class="badge badge-sale">SALE</span>';
    if(p.disc>0) badges+='<span class="badge badge-disc">-'+p.disc+'%</span>';

    var imgHtml = p.photo
      ? '<img src="'+p.photo+'" alt="'+p.name+'">'
      : '<span class="pc-img-emoji">'+p.emo+'</span>';

    var discHtml = p.disc>0
      ? '<span class="pc-orig">Rs. '+p.price.toLocaleString()+'</span><span class="pc-disc">-'+p.disc+'%</span>'
      : "";

    html+='<div class="pc" onclick="openQV('+p.id+')">'
      +'<div class="pc-badge">'+badges+'</div>'
      +'<button class="pc-wishlist" id="wl-'+p.id+'" onclick="event.stopPropagation();toggleWish('+p.id+')" title="Wishlist"><i class="far fa-heart"></i></button>'
      +'<div class="pc-img">'+imgHtml
        +'<div class="pc-overlay"><button class="btn-quick" onclick="event.stopPropagation();openQV('+p.id+')"><i class="fas fa-eye"></i> Quick View</button></div>'
      +'</div>'
      +'<div class="pc-body">'
      +'<div class="pc-cat">'+p.cat+'</div>'
      +'<div class="pc-name">'+p.name+'</div>'
      +'<div class="pc-desc">'+p.desc+'</div>'
      +'<div class="pc-pricing"><span class="pc-price">Rs. '+price.toLocaleString()+'</span>'+discHtml+'</div>'
      +'<button class="btn-add" id="ba-'+p.id+'" onclick="event.stopPropagation();addToCart('+p.id+',1)">'
        +'<i class="fas fa-cart-plus"></i> Add to Cart</button>'
      +'</div></div>';
  });
  g.innerHTML=html;
}

// ── QUICK VIEW ────────────────────────────────────────────────────
function openQV(id){
  var p=products.find(function(x){ return x.id===id; });
  if(!p) return;
  qvCurrent=p; qvQty=1;

  var imgHtml = p.photo
    ? '<img src="'+p.photo+'" alt="'+p.name+'">'
    : p.emo;
  document.getElementById("qv-img").innerHTML=imgHtml;

  var price=dp(p);
  var discHtml = p.disc>0
    ? '<span class="qv-orig">Rs. '+p.price.toLocaleString()+'</span><span class="qv-save">Save '+p.disc+'%</span>'
    :"";

  document.getElementById("qv-body").innerHTML=
    '<div class="qv-cat">'+p.cat+'</div>'
    +'<div class="qv-name">'+p.name+'</div>'
    +'<div class="qv-desc">'+p.desc+'</div>'
    +'<div class="qv-pricing"><span class="qv-price">Rs. '+price.toLocaleString()+'</span>'+discHtml+'</div>'
    +'<div class="qv-qty-row">'
    +'<span class="qv-qty-label">Quantity:</span>'
    +'<div class="qv-qty-ctrl">'
    +'<button class="qv-qty-btn" onclick="changeQVQty(-1)">-</button>'
    +'<span class="qv-qty-val" id="qv-qty">1</span>'
    +'<button class="qv-qty-btn" onclick="changeQVQty(1)">+</button>'
    +'</div></div>'
    +'<button class="btn-qv-add" onclick="addToCart('+p.id+',qvQty);closeQV()">'
    +'<i class="fas fa-cart-plus"></i> Add to Cart &mdash; Rs. '+(price).toLocaleString()+'</button>';

  document.getElementById("qv-modal").classList.add("open");
}

function changeQVQty(d){
  qvQty=Math.max(1,qvQty+d);
  var el=document.getElementById("qv-qty");
  if(el) el.textContent=qvQty;
  // update total in button
  if(qvCurrent){
    var btn=document.querySelector(".btn-qv-add");
    if(btn) btn.innerHTML='<i class="fas fa-cart-plus"></i> Add to Cart &mdash; Rs. '+(dp(qvCurrent)*qvQty).toLocaleString();
  }
}

function closeQV(){
  document.getElementById("qv-modal").classList.remove("open");
  qvCurrent=null; qvQty=1;
}

// ── WISHLIST (local) ──────────────────────────────────────────────
var wish=JSON.parse(localStorage.getItem("lc_wish")||"[]");
function toggleWish(id){
  var idx=wish.indexOf(id);
  if(idx>=0) wish.splice(idx,1); else wish.push(id);
  localStorage.setItem("lc_wish",JSON.stringify(wish));
  var btn=document.getElementById("wl-"+id);
  if(btn){ btn.innerHTML=wish.includes(id)?'<i class="fas fa-heart"></i>':'<i class="far fa-heart"></i>'; btn.classList.toggle("liked",wish.includes(id)); }
}

// ── CART ─────────────────────────────────────────────────────────
function addToCart(id,qty){
  qty=qty||1;
  var p=products.find(function(x){ return x.id===id; });
  if(!p) return;
  var ex=cart.find(function(x){ return x.id===id; });
  if(ex) ex.qty+=qty; else cart.push({id:id,name:p.name,price:dp(p),emo:p.emo,photo:p.photo,qty:qty});
  saveCart(); renderCart(); updBadge();
  showToast("&#10003; "+p.name+" added!");
  var btn=document.getElementById("ba-"+id);
  if(btn){
    btn.classList.add("added"); btn.innerHTML='<i class="fas fa-check"></i> Added!';
    setTimeout(function(){ btn.classList.remove("added"); btn.innerHTML='<i class="fas fa-cart-plus"></i> Add to Cart'; },1500);
  }
}

function remFromCart(id){ cart=cart.filter(function(x){ return x.id!==id; }); saveCart(); renderCart(); updBadge(); }

function changeQty(id,d){
  var it=cart.find(function(x){ return x.id===id; });
  if(!it) return;
  it.qty+=d;
  if(it.qty<=0) remFromCart(id); else { saveCart(); renderCart(); updBadge(); }
}

function renderCart(){
  var el=document.getElementById("cart-body");
  var ft=document.getElementById("cart-ft");
  if(!cart.length){
    el.innerHTML='<div class="cart-empty"><i class="fas fa-shopping-bag"></i><p style="font-weight:700;margin-top:9px">Cart is empty</p><p style="font-size:.8rem;margin-top:3px">Browse and add items!</p></div>';
    ft.style.display="none"; return;
  }
  var html=""; var total=0;
  cart.forEach(function(it){
    total+=it.price*it.qty;
    var thumb=it.photo?'<img src="'+it.photo+'" alt="">':it.emo;
    html+='<div class="citem">'
      +'<div class="cemo">'+thumb+'</div>'
      +'<div class="cinfo"><div class="cname">'+it.name+'</div>'
      +'<div class="cprice">Rs. '+(it.price*it.qty).toLocaleString()+'</div>'
      +'<div class="cqty">'
      +'<button class="qbtn" onclick="changeQty('+it.id+',-1)">-</button>'
      +'<span class="qval">'+it.qty+'</span>'
      +'<button class="qbtn" onclick="changeQty('+it.id+',1)">+</button>'
      +'</div></div>'
      +'<button class="cdel" onclick="remFromCart('+it.id+')"><i class="fas fa-trash"></i></button>'
      +'</div>';
  });
  el.innerHTML=html;
  document.getElementById("cs").textContent="Rs. "+total.toLocaleString();
  document.getElementById("ct").textContent="Rs. "+total.toLocaleString();
  ft.style.display="block";
}

function updBadge(){
  var n=0; cart.forEach(function(i){ n+=i.qty; });
  document.getElementById("cart-count").textContent=n;
}

function toggleCart(){
  document.getElementById("cart-side").classList.toggle("open");
  document.getElementById("cart-overlay").classList.toggle("open");
}

function clearCart(){if(!cart.length)return;if(confirm("Clear all items from cart?")){cart=[];saveCart();renderCart();updBadge();showToast("Cart cleared!");}}
function checkout(){
  if(!cart.length){ showToast("Cart is empty!"); return; }
  var total=0; var msg="Hello Little Cuddle!\n\nOrder Request:\n\n";
  cart.forEach(function(i){ total+=i.price*i.qty; msg+="- "+i.name+" x"+i.qty+" = Rs. "+(i.price*i.qty).toLocaleString()+"\n"; });
  msg+="\nTotal: Rs. "+total.toLocaleString()+"\n\nPlease confirm. Thank you!";
  window.open("https://wa.me/94766787992?text="+encodeURIComponent(msg),"_blank");
}

// ── TRACKING ─────────────────────────────────────────────────────
function trackOrder(){
  var num=document.getElementById("track-num").value.trim();
  if(!num){ alert("Please enter a tracking number!"); return; }
  window.open("https://www.domex.lk/Order-Details.php?wbno="+encodeURIComponent(num),"_blank");
}

// ── MODALS ────────────────────────────────────────────────────────
document.getElementById("qv-modal").addEventListener("click",function(e){ if(e.target===this) closeQV(); });
document.addEventListener("keydown",function(e){ if(e.key==="Escape"){ closeQV(); document.getElementById("cart-side").classList.remove("open"); document.getElementById("cart-overlay").classList.remove("open"); }});

// ── TOAST ─────────────────────────────────────────────────────────
function showToast(msg){ var t=document.getElementById("toast"); t.innerHTML=msg; t.classList.add("show"); setTimeout(function(){ t.classList.remove("show"); },2600); }

// ── INIT ─────────────────────────────────────────────────────────
updateCounts();
applyFilters();
renderCart();
updBadge();
</script>
